services:
  notification-service:
    environment:
      DEVHIRE_NOTIFICATION_EMAIL_FROM: ${GMAIL_SMTP_FROM:?Set GMAIL_SMTP_FROM}
      DEVHIRE_NOTIFICATION_EMAIL_REPLY_TO: ${GMAIL_SMTP_REPLY_TO:-${GMAIL_SMTP_FROM}}
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${GMAIL_SMTP_USERNAME:?Set GMAIL_SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${GMAIL_SMTP_APP_PASSWORD:?Set GMAIL_SMTP_APP_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_SMTP_SSL_TRUST: smtp.gmail.com
