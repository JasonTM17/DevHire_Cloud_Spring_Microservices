server:
  port: ${SERVER_PORT:8086}
spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${SERVICE_DATABASE:devhire_notification}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:devhire}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:devhire_local_password}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.devhire.common.event,java.util,java.lang
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
user-service:
  url: ${USER_SERVICE_URL:http://localhost:8082}
devhire:
  notification:
    email:
      enabled: ${DEVHIRE_NOTIFICATION_EMAIL_ENABLED:false}
      from: ${DEVHIRE_NOTIFICATION_EMAIL_FROM:no-reply@devhire.local}
      reply-to: ${DEVHIRE_NOTIFICATION_EMAIL_REPLY_TO:}
      dashboard-base-url: ${DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL:http://localhost:8080}
management:
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:${DEVHIRE_NOTIFICATION_EMAIL_ENABLED:false}}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
