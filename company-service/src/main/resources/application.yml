server:
  port: ${SERVER_PORT:8083}
spring:
  application:
    name: company-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${SERVICE_DATABASE:devhire_company}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:devhire}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:devhire_local_password}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
devhire:
  outbox:
    publisher:
      enabled: ${DEVHIRE_OUTBOX_PUBLISHER_ENABLED:true}
      batch-size: ${DEVHIRE_OUTBOX_BATCH_SIZE:25}
      max-attempts: ${DEVHIRE_OUTBOX_MAX_ATTEMPTS:10}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
