name: devhire-cloud

services:
  postgres:
    image: postgres:17-alpine
    container_name: devhire-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devhire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devhire_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-devhire}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devhire} -d ${POSTGRES_DB:-devhire}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devhire

  redis:
    image: redis:7.4-alpine
    container_name: devhire-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devhire

  kafka:
    image: apache/kafka:3.9.0
    container_name: devhire-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - devhire

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: devhire-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api-gateway
    networks:
      - devhire

  grafana:
    image: grafana/grafana:11.4.0
    container_name: devhire-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - devhire

  loki:
    image: grafana/loki:3.3.2
    container_name: devhire-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    networks:
      - devhire

  tempo:
    image: grafana/tempo:2.6.1
    container_name: devhire-tempo
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"
      - "${TEMPO_GRPC_HOST_PORT:-4317}:4317"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    networks:
      - devhire

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: devhire-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "${OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "${OTEL_METRICS_HOST_PORT:-8889}:8889"
    volumes:
      - ./infra/otel/collector.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - tempo
    networks:
      - devhire

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      args:
        SERVICE_NAME: api-gateway
    image: devhire/api-gateway:local
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-this-secret-with-at-least-32-characters}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      COMPANY_SERVICE_URL: http://company-service:8083
      JOB_SERVICE_URL: http://job-service:8084
      APPLICATION_SERVICE_URL: http://application-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      AUDIT_SERVICE_URL: http://audit-service:8087
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
      args:
        SERVICE_NAME: auth-service
    image: devhire/auth-service:local
    environment: &service-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-devhire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devhire_local_password}
      SERVICE_DATABASE: devhire_auth
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-this-secret-with-at-least-32-characters}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - "${AUTH_HOST_PORT:-8081}:8081"
    depends_on: &service-depends
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
      args:
        SERVICE_NAME: user-service
    image: devhire/user-service:local
    environment:
      <<: *service-env
      SERVICE_DATABASE: devhire_user
    ports:
      - "${USER_HOST_PORT:-8082}:8082"
    depends_on: *service-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  company-service:
    build:
      context: .
      dockerfile: company-service/Dockerfile
      args:
        SERVICE_NAME: company-service
    image: devhire/company-service:local
    environment:
      <<: *service-env
      SERVICE_DATABASE: devhire_company
    ports:
      - "${COMPANY_HOST_PORT:-8083}:8083"
    depends_on: *service-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  job-service:
    build:
      context: .
      dockerfile: job-service/Dockerfile
      args:
        SERVICE_NAME: job-service
    image: devhire/job-service:local
    environment:
      <<: *service-env
      SERVICE_DATABASE: devhire_job
      COMPANY_SERVICE_URL: http://company-service:8083
    ports:
      - "${JOB_HOST_PORT:-8084}:8084"
    depends_on: *service-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  application-service:
    build:
      context: .
      dockerfile: application-service/Dockerfile
      args:
        SERVICE_NAME: application-service
    image: devhire/application-service:local
    environment:
      <<: *service-env
      SERVICE_DATABASE: devhire_application
      JOB_SERVICE_URL: http://job-service:8084
    ports:
      - "${APPLICATION_HOST_PORT:-8085}:8085"
    depends_on: *service-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
      args:
        SERVICE_NAME: notification-service
    image: devhire/notification-service:local
    environment:
      <<: *service-env
      SERVICE_DATABASE: devhire_notification
    ports:
      - "${NOTIFICATION_HOST_PORT:-8086}:8086"
    depends_on: *service-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
      args:
        SERVICE_NAME: audit-service
    image: devhire/audit-service:local
    environment:
      <<: *service-env
      SERVICE_DATABASE: devhire_audit
    ports:
      - "${AUDIT_HOST_PORT:-8087}:8087"
    depends_on: *service-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - devhire

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  tempo-data:

networks:
  devhire:
    driver: bridge
