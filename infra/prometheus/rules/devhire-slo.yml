groups:
  - name: devhire-slo
    rules:
      - alert: DevHireGatewayHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="api-gateway",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{application="api-gateway"}[5m])), 0.001)
          ) > 0.02
        for: 10m
        labels:
          severity: page
          service: api-gateway
          slo: availability
        annotations:
          summary: DevHire Gateway 5xx rate is above 2%
          description: The Gateway is burning availability budget. Check recent deployments, downstream service health, and traces.

      - alert: DevHireGatewayP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{application="api-gateway"}[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: api-gateway
          slo: latency
        annotations:
          summary: DevHire Gateway p95 latency is above 1s
          description: Gateway p95 latency is over the SLO threshold for 10 minutes.

      - alert: DevHireServiceDown
        expr: up{job="devhire-services"} == 0
        for: 2m
        labels:
          severity: page
          slo: availability
        annotations:
          summary: DevHire service target is down
          description: 'Prometheus cannot scrape {{ $labels.instance }}. Check container health, readiness, and network connectivity.'

      - alert: DevHireJvmHeapPressureHigh
        expr: |
          (
            sum by (application) (jvm_memory_used_bytes{area="heap"})
            /
            clamp_min(sum by (application) (jvm_memory_max_bytes{area="heap"}), 1)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          slo: capacity
        annotations:
          summary: DevHire JVM heap pressure is above 85%
          description: '{{ $labels.application }} heap usage is high. Review GC, memory limits, and request load.'

      - alert: DevHireJobSearchP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{application="job-service",uri="/jobs"}[5m]))
          ) > 0.75
        for: 10m
        labels:
          severity: warning
          service: job-service
          slo: search-latency
        annotations:
          summary: DevHire job search p95 latency is above 750ms
          description: Job search is slower than target. Check PostgreSQL/OpenSearch health and query filters.

      - alert: DevHireOutboxPublishFailures
        expr: increase(devhire_outbox_publish_failure_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
          slo: event-reliability
        annotations:
          summary: DevHire outbox publishing failures detected
          description: 'Outbox publish failures were observed for topic {{ $labels.topic }}. Check Kafka, retry backlog, and dead-letter status.'

      - alert: DevHireOutboxBacklogHigh
        expr: sum by (service, status) (devhire_outbox_backlog{status=~"PENDING|FAILED|DEAD_LETTER"}) > 50
        for: 15m
        labels:
          severity: warning
          slo: event-reliability
        annotations:
          summary: DevHire outbox backlog is above 50 rows
          description: '{{ $labels.service }} has an outbox backlog in {{ $labels.status }}. Check Kafka, publisher retries, and dead-letter runbooks.'

      - alert: DevHireEmailRetryBacklogHigh
        expr: sum(devhire_email_delivery_total{status="FAILED_RETRYABLE"}) > 25
        for: 30m
        labels:
          severity: warning
          service: notification-service
          slo: notification-delivery
        annotations:
          summary: DevHire email retry backlog is high
          description: Retryable email delivery failures are accumulating. Check Mailpit/Gmail SMTP, provider rate limits, and fallback internal notifications.

      - alert: DevHireSearchFallbackSpike
        expr: increase(devhire_job_search_requests_total{status="fallback"}[15m]) > 5
        for: 5m
        labels:
          severity: warning
          service: job-service
          slo: search-resilience
        annotations:
          summary: DevHire search fallback spike detected
          description: OpenSearch searches are falling back to PostgreSQL frequently. Check OpenSearch readiness, index health, and query failures.

      - alert: DevHireDbPoolSaturation
        expr: |
          (
            sum by (application) (hikaricp_connections_active)
            /
            clamp_min(sum by (application) (hikaricp_connections_max), 1)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          slo: database-capacity
        annotations:
          summary: DevHire database connection pool saturation is high
          description: '{{ $labels.application }} is using more than 85% of the configured Hikari connection pool.'

      - alert: DevHireAiP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(devhire_ai_chat_latency_seconds_bucket[5m]))
          ) > 5
        for: 10m
        labels:
          severity: warning
          service: ai-service
          slo: ai-latency
        annotations:
          summary: DevHire AI assistant p95 latency is above 5s
          description: Claude/RAG response latency is above the reviewer-demo target. Check Anthropic API latency, job-service calls, and fallback status.

      - alert: DevHireAiFallbackSpike
        expr: increase(devhire_ai_fallback_total[15m]) > 5
        for: 5m
        labels:
          severity: warning
          service: ai-service
          slo: ai-provider
        annotations:
          summary: DevHire AI assistant fallback mode is being used frequently
          description: Claude API calls are falling back to deterministic demo mode. Check ANTHROPIC_API_KEY, Anthropic availability, and outbound network policy.

      - alert: DevHireAiProviderCircuitOpen
        expr: max(devhire_ai_provider_circuit_open) > 0
        for: 2m
        labels:
          severity: warning
          service: ai-service
          slo: ai-provider
        annotations:
          summary: DevHire AI provider circuit breaker is open
          description: ai-service has opened the Claude provider circuit after consecutive failures and is serving deterministic fallback responses.

      - alert: DevHireAiHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="ai-service",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{application="ai-service"}[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: ai-service
          slo: ai-availability
        annotations:
          summary: DevHire AI assistant 5xx rate is above 5%
          description: AI API errors are burning the assistant demo reliability budget. Check ai-service logs, database health, and Claude client configuration.
