groups:
  - name: devhire-slo
    rules:
      - alert: DevHireGatewayHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="api-gateway",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{application="api-gateway"}[5m])), 0.001)
          ) > 0.02
        for: 10m
        labels:
          severity: page
          service: api-gateway
          slo: availability
        annotations:
          summary: DevHire Gateway 5xx rate is above 2%
          description: The Gateway is burning availability budget. Check recent deployments, downstream service health, and traces.

      - alert: DevHireGatewayP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{application="api-gateway"}[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: api-gateway
          slo: latency
        annotations:
          summary: DevHire Gateway p95 latency is above 1s
          description: Gateway p95 latency is over the SLO threshold for 10 minutes.

      - alert: DevHireGatewayRouteP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (route, le) (rate(devhire_gateway_request_latency_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: api-gateway
          slo: route-latency
        annotations:
          summary: DevHire Gateway route p95 latency is above 1s
          description: '{{ $labels.route }} is slower than the route SLO. Check downstream service health, rate limiting, and traces.'

      - alert: DevHireGatewayRateLimitSpike
        expr: sum by (route) (increase(devhire_gateway_rate_limited_total[10m])) > 20
        for: 5m
        labels:
          severity: warning
          service: api-gateway
          slo: traffic-control
        annotations:
          summary: DevHire Gateway rate-limit spike detected
          description: '{{ $labels.route }} is receiving elevated 429 responses. Check client behavior and Redis rate limiter health.'

      - alert: DevHireServiceDown
        expr: up{job="devhire-services"} == 0
        for: 2m
        labels:
          severity: page
          slo: availability
        annotations:
          summary: DevHire service target is down
          description: 'Prometheus cannot scrape {{ $labels.instance }}. Check container health, readiness, and network connectivity.'

      - alert: DevHireJvmHeapPressureHigh
        expr: |
          (
            sum by (application) (jvm_memory_used_bytes{area="heap"})
            /
            clamp_min(sum by (application) (jvm_memory_max_bytes{area="heap"}), 1)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          slo: capacity
        annotations:
          summary: DevHire JVM heap pressure is above 85%
          description: '{{ $labels.application }} heap usage is high. Review GC, memory limits, and request load.'

      - alert: DevHireJobSearchP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{application="job-service",uri="/jobs"}[5m]))
          ) > 0.75
        for: 10m
        labels:
          severity: warning
          service: job-service
          slo: search-latency
        annotations:
          summary: DevHire job search p95 latency is above 750ms
          description: Job search is slower than target. Check PostgreSQL/OpenSearch health and query filters.

      - alert: DevHireOutboxPublishFailures
        expr: increase(devhire_outbox_publish_failure_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
          slo: event-reliability
        annotations:
          summary: DevHire outbox publishing failures detected
          description: 'Outbox publish failures were observed for topic {{ $labels.topic }}. Check Kafka, retry backlog, and dead-letter status.'

      - alert: DevHireOutboxBacklogHigh
        expr: sum by (service, status) (devhire_outbox_backlog{status=~"PENDING|FAILED|DEAD_LETTER"}) > 50
        for: 15m
        labels:
          severity: warning
          slo: event-reliability
        annotations:
          summary: DevHire outbox backlog is above 50 rows
          description: '{{ $labels.service }} has an outbox backlog in {{ $labels.status }}. Check Kafka, publisher retries, and dead-letter runbooks.'

      - alert: DevHireEmailRetryBacklogHigh
        expr: sum(devhire_email_delivery{status="FAILED_RETRYABLE"}) > 25
        for: 30m
        labels:
          severity: warning
          service: notification-service
          slo: notification-delivery
        annotations:
          summary: DevHire email retry backlog is high
          description: Retryable email delivery failures are accumulating. Check Mailpit/Gmail SMTP, provider rate limits, and fallback internal notifications.

      - alert: DevHireSearchFallbackSpike
        expr: increase(devhire_job_search_requests_total{status="fallback"}[15m]) > 5
        for: 5m
        labels:
          severity: warning
          service: job-service
          slo: search-resilience
        annotations:
          summary: DevHire search fallback spike detected
          description: OpenSearch searches are falling back to PostgreSQL frequently. Check OpenSearch readiness, index health, and query failures.

      - alert: DevHireDbPoolSaturation
        expr: |
          (
            sum by (application) (hikaricp_connections_active)
            /
            clamp_min(sum by (application) (hikaricp_connections_max), 1)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          slo: database-capacity
        annotations:
          summary: DevHire database connection pool saturation is high
          description: '{{ $labels.application }} is using more than 85% of the configured Hikari connection pool.'

      - alert: DevHireAiP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(devhire_ai_chat_latency_seconds_bucket[5m]))
          ) > 5
        for: 10m
        labels:
          severity: warning
          service: ai-service
          slo: ai-latency
        annotations:
          summary: DevHire AI assistant p95 latency is above 5s
          description: Claude/RAG response latency is above the reviewer-demo target. Check Anthropic API latency, job-service calls, and fallback status.

      - alert: DevHireAiFallbackSpike
        expr: increase(devhire_ai_fallback_total[15m]) > 5
        for: 5m
        labels:
          severity: warning
          service: ai-service
          slo: ai-provider
        annotations:
          summary: DevHire AI assistant fallback mode is being used frequently
          description: Claude API calls are falling back to deterministic demo mode. Check ANTHROPIC_API_KEY, Anthropic availability, and outbound network policy.

      - alert: DevHireAiProviderCircuitOpen
        expr: max(devhire_ai_provider_circuit_open) > 0
        for: 2m
        labels:
          severity: warning
          service: ai-service
          slo: ai-provider
        annotations:
          summary: DevHire AI provider circuit breaker is open
          description: ai-service has opened the Claude provider circuit after consecutive failures and is serving deterministic fallback responses.

      - alert: DevHireAiHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="ai-service",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{application="ai-service"}[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: ai-service
          slo: ai-availability
        annotations:
          summary: DevHire AI assistant 5xx rate is above 5%
          description: AI API errors are burning the assistant demo reliability budget. Check ai-service logs, database health, and Claude client configuration.

      - alert: DevHireCodeGradingFailures
        expr: increase(devhire_code_grading_requests_total{status="failure"}[10m]) > 0
        for: 5m
        labels:
          severity: warning
          service: application-service
          slo: assessment-quality
        annotations:
          summary: DevHire code assessment grading failures detected
          description: Deterministic code grading failed for submitted assessments. Check application-service logs and grader/rubric deployment changes.

      - alert: DevHireCodeAssessmentReviewBacklogHigh
        expr: sum(devhire_code_assessments{status=~"SUBMITTED|REVIEWED|AUTO_REVIEWED"}) > 20
        for: 30m
        labels:
          severity: warning
          service: application-service
          slo: assessment-review
        annotations:
          summary: DevHire code assessment review backlog is high
          description: Candidate submissions are waiting for employer review. Check reviewer staffing, queue filters, and assessment due-date workflow.

      - alert: DevHireAssessmentRunnerUnavailableSpike
        expr: increase(devhire_assessment_runner_requests_total{verdict="runner_unavailable"}[10m]) > 0
        for: 5m
        labels:
          severity: critical
          service: assessment-runner-service
          slo: assessment-availability
        annotations:
          summary: DevHire assessment runner unavailable verdicts detected
          description: Candidate code submissions are failing closed because the runner is unavailable. Check Judge0 connectivity, internal token routing, and assessment-runner-service readiness.

      - alert: DevHireAssessmentRunnerFailClosed
        expr: max(devhire_assessment_runner_fail_closed) > 0
        for: 5m
        labels:
          severity: critical
          service: assessment-runner-service
          slo: assessment-availability
        annotations:
          summary: DevHire assessment runner is fail-closed
          description: Server-side code grading is intentionally unavailable or Judge0 configuration is missing. Production must not fall back to deterministic scoring.

      - alert: DevHireAssessmentRunnerCompileErrorSpike
        expr: increase(devhire_assessment_runner_requests_total{verdict="compile_error"}[15m]) > 5
        for: 10m
        labels:
          severity: warning
          service: assessment-runner-service
          slo: assessment-quality
        annotations:
          summary: DevHire compile-error verdicts are elevated
          description: A spike in compile errors can indicate a broken starter contract, stale challenge copy, or Judge0 Java harness regression.

      - alert: DevHireAssessmentRunnerTimeoutSpike
        expr: increase(devhire_assessment_runner_requests_total{verdict="time_limit_exceeded"}[15m]) > 3
        for: 10m
        labels:
          severity: warning
          service: assessment-runner-service
          slo: assessment-latency
        annotations:
          summary: DevHire code assessment timeouts are elevated
          description: Candidate submissions are timing out more often than expected. Review challenge limits, Judge0 queue latency, and malicious/infinite-loop submissions.

      - alert: DevHireAssessmentRunnerPolicyBlockedSpike
        expr: increase(devhire_assessment_runner_requests_total{verdict="policy_blocked"}[15m]) > 3
        for: 10m
        labels:
          severity: warning
          service: assessment-runner-service
          slo: assessment-safety
        annotations:
          summary: DevHire code assessment policy blocks are elevated
          description: Sandbox policy is blocking candidate submissions. Review risky code patterns and confirm policy rules still match the Java solve contract.

      - alert: DevHireAssessmentRunnerQueueDepthHigh
        expr: max(devhire_assessment_runner_queue_depth) > 10
        for: 10m
        labels:
          severity: warning
          service: assessment-runner-service
          slo: assessment-latency
        annotations:
          summary: DevHire assessment runner queue depth is high
          description: The runner queue is backing up. Check Judge0 capacity, polling latency, and assessment-runner-service replicas.

      - alert: DevHireAssessmentRunnerLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(devhire_assessment_runner_latency_seconds_bucket[5m]))
          ) > 3
        for: 10m
        labels:
          severity: warning
          service: assessment-runner-service
          slo: assessment-latency
        annotations:
          summary: DevHire assessment runner p95 latency is high
          description: Code execution latency is above the expected budget. Check Judge0 queue, network, and sandbox polling behavior.

      - alert: DevHireAssessmentRunnerSandboxFailures
        expr: increase(devhire_assessment_runner_sandbox_failures_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
          service: assessment-runner-service
          slo: assessment-safety
        annotations:
          summary: DevHire assessment runner sandbox failures detected
          description: Sandbox execution failed or policy blocked candidate code. Check runner logs and the candidate evidence trail before review decisions.

      - alert: DevHireCodeRunnerClientFailures
        expr: increase(devhire_code_runner_client_failures_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
          service: application-service
          slo: assessment-availability
        annotations:
          summary: DevHire application-service runner client failures detected
          description: application-service could not call assessment-runner-service. Check Gateway routes, service discovery, internal tokens, and runner health.

      - alert: DevHireCodeRiskFlagBacklogHigh
        expr: sum(devhire_code_review_risk_flags{type="any"}) > 10
        for: 30m
        labels:
          severity: warning
          service: application-service
          slo: assessment-safety
        annotations:
          summary: DevHire risky code submission backlog is high
          description: Static grading detected elevated code risk flags. Review unsafe patterns and candidate feedback before advancing applicants.

      - alert: DevHireCodeGradingLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(devhire_code_grading_latency_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: application-service
          slo: assessment-latency
        annotations:
          summary: DevHire code grading p95 latency is above 1s
          description: Deterministic code assessment analysis is slower than expected. Check rubric changes and application-service CPU pressure.
