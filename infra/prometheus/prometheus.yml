global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: devhire-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - auth-service:8081
          - user-service:8082
          - company-service:8083
          - job-service:8084
          - application-service:8085
          - notification-service:8086
          - audit-service:8087

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

