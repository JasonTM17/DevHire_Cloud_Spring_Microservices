name: CI

on:
  push:
    branches:
      - main
      - master
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Maven Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        run: mvn -B -T1 clean verify

      - name: Coverage gate
        shell: pwsh
        run: ./scripts/check-coverage.ps1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Frontend property tests
        working-directory: frontend
        env:
          FAST_CHECK_NUM_RUNS: 500
        run: npm run test:properties

      - name: Frontend contrast check
        run: node frontend/scripts/check-contrast.mjs

      - name: Frontend e2e tests
        if: ${{ env.E2E_FRONTEND_URL != '' }}
        working-directory: frontend
        run: npm run e2e

      - name: Frontend bundle size check
        run: node frontend/scripts/check-bundle-size.mjs

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/site/jacoco/**
          if-no-files-found: ignore
