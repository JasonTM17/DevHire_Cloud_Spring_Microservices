name: API Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  gateway-smoke:
    name: Gateway API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Run API smoke through Gateway
        shell: pwsh
        run: ./scripts/api-smoke.ps1 -StartStack -Build -GatewayUrl http://localhost:18080

      - name: Upload compose logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-api-smoke.log

      - name: Store compose logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-api-smoke-log
          path: compose-api-smoke.log
          if-no-files-found: ignore
