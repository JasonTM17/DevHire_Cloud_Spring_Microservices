name: E2E Smoke

on:
  push:
    branches:
      - master
      - "v*"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 1"

permissions:
  contents: read

jobs:
  frontend-preview-smoke:
    name: Frontend Preview Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke and mobile checks
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:18080
        run: npm run e2e:all

      - name: Verify API compatibility manifest
        shell: pwsh
        run: ./scripts/api-compatibility.ps1 -ManifestOnly

      - name: Upload Playwright preview report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-preview-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  browser-smoke:
    name: Docker Compose Browser Smoke
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke stack
        shell: pwsh
        run: ./scripts/e2e-smoke.ps1 -Build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
