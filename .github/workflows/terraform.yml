name: Terraform

on:
  pull_request:
    paths:
      - "deploy/terraform/aws/**"
      - "scripts/terraform-validate.ps1"
      - ".github/workflows/terraform.yml"
      - ".github/dependabot.yml"
      - "docs/aws-terraform.md"
      - "docs/cost-estimate.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate AWS Blueprint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Terraform fmt validate lint and config scan
        shell: pwsh
        run: ./scripts/terraform-validate.ps1
