name: Docker Images

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - company-service
          - job-service
          - application-service
          - notification-service
          - audit-service
          - ai-service
          - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image metadata
        id: image-metadata
        shell: bash
        run: |
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME:-${GITHUB_SHA}}" >> "$GITHUB_OUTPUT"
          echo "source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            BUILD_VERSION=${{ steps.image-metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ steps.image-metadata.outputs.source }}
            BUILD_CREATED=${{ steps.image-metadata.outputs.created }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080' }}
          tags: devhire/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=devhire-${{ matrix.service }}
            org.opencontainers.image.description=DevHire Cloud ${{ matrix.service }} image
            org.opencontainers.image.source=${{ steps.image-metadata.outputs.source }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image-metadata.outputs.version }}
            org.opencontainers.image.created=${{ steps.image-metadata.outputs.created }}
            org.opencontainers.image.licenses=MIT
          push: false
          load: false
