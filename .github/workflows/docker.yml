name: Docker Images

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - company-service
          - job-service
          - application-service
          - notification-service
          - audit-service
          - ai-service
          - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080' }}
          tags: devhire/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=devhire-${{ matrix.service }}
            org.opencontainers.image.description=DevHire Cloud ${{ matrix.service }} image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          push: false
          load: false
