name: Dependabot Curation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Preview, label safe batches, close deferred major PRs, or run zero-noise policy."
        required: true
        type: choice
        default: dry-run
        options:
          - dry-run
          - label-safe
          - close-deferred
          - zero-noise

permissions:
  contents: read

jobs:
  dependabot-curation:
    name: Dependabot Curation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run curation
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_GOVERNANCE_TOKEN }}
        run: |
          $mode = "${{ inputs.mode }}"

          if ($mode -eq "dry-run") {
            ./scripts/dependabot-curate.ps1 -DryRun
            return
          }

          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw "REPO_GOVERNANCE_TOKEN repository secret is required for Dependabot curation apply modes."
          }

          if ($mode -eq "label-safe") {
            ./scripts/dependabot-curate.ps1 -Apply -SafeOnly
          } elseif ($mode -eq "close-deferred") {
            ./scripts/dependabot-curate.ps1 -Apply -CloseDeferred
          } elseif ($mode -eq "zero-noise") {
            ./scripts/dependabot-zero-noise.ps1 -Apply
          } else {
            throw "Unsupported Dependabot curation mode: $mode"
          }

      - name: Upload curation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-curation-reports
          path: |
            reports/dependabot-curate/
            reports/dependabot-zero-noise/
          if-no-files-found: ignore
