name: Security

on:
  push:
    branches:
      - main
      - master
      - "v*"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * 1"

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare reports directory
        run: mkdir -p security-reports

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          output: security-reports/trivy-fs.txt
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy filesystem report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-filesystem-report
          path: security-reports/trivy-fs.txt
          if-no-files-found: warn

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare reports directory
        run: mkdir -p security-reports

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: security-reports/devhire-cloud-sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: devhire-cloud-sbom
          path: security-reports/devhire-cloud-sbom.cdx.json

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high

      - name: Record dependency review posture
        run: |
          {
            echo "### Dependency Review"
            echo
            echo "Dependency Review runs on pull requests as a supply-chain signal."
            echo "If GitHub dependency graph is disabled for the repository, the action is report-only and branch protection relies on Gitleaks, Trivy, SBOM, Maven dependency tree, and CodeQL."
          } >> "$GITHUB_STEP_SUMMARY"

  maven-dependency-tree:
    name: Maven Dependency Tree
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve dependency tree
        run: mvn -B -DskipTests dependency:tree

  image-scan:
    name: Trivy Image Scan ${{ matrix.service }}
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - company-service
          - job-service
          - application-service
          - notification-service
          - audit-service
          - ai-service
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image metadata
        id: image-metadata
        shell: bash
        run: |
          {
            echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "version=${GITHUB_REF_NAME:-${GITHUB_SHA}}"
            echo "source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Build local image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            BUILD_VERSION=${{ steps.image-metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ steps.image-metadata.outputs.source }}
            BUILD_CREATED=${{ steps.image-metadata.outputs.created }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080' }}
          tags: devhire/${{ matrix.service }}:security-${{ github.sha }}
          cache-from: type=gha,scope=security-${{ matrix.service }}
          cache-to: type=gha,scope=security-${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.title=devhire-${{ matrix.service }}
            org.opencontainers.image.description=DevHire Cloud ${{ matrix.service }} image
            org.opencontainers.image.source=${{ steps.image-metadata.outputs.source }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image-metadata.outputs.version }}
            org.opencontainers.image.created=${{ steps.image-metadata.outputs.created }}
            org.opencontainers.image.licenses=MIT
          load: true

      - name: Prepare reports directory
        run: mkdir -p security-reports

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devhire/${{ matrix.service }}:security-${{ github.sha }}
          scanners: vuln
          format: table
          output: security-reports/trivy-image-${{ matrix.service }}.txt
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload image scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-image-${{ matrix.service }}
          path: security-reports/trivy-image-${{ matrix.service }}.txt
          if-no-files-found: warn
