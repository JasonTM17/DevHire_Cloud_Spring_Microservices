name: Repository Governance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run a preview or apply repository metadata and branch protection."
        required: true
        type: choice
        default: dry-run
        options:
          - dry-run
          - apply-metadata
          - apply-branch-protection
          - apply-all
          - verify-only

permissions:
  actions: read
  contents: read

jobs:
  repository-governance:
    name: Repository Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dry-run repository governance
        if: ${{ inputs.mode == 'dry-run' }}
        shell: pwsh
        run: ./scripts/github-governance.ps1 -DryRun

      - name: Apply repository metadata
        if: ${{ inputs.mode == 'apply-metadata' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_GOVERNANCE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw "REPO_GOVERNANCE_TOKEN repository secret is required for apply mode."
          }
          ./scripts/github-governance.ps1 -Apply -MetadataOnly
          ./scripts/github-facade-assert.ps1 -MetadataOnly

      - name: Apply branch protection
        if: ${{ inputs.mode == 'apply-branch-protection' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_GOVERNANCE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw "REPO_GOVERNANCE_TOKEN repository secret is required for apply mode."
          }
          ./scripts/github-check-contexts.ps1 -RequireAvailable
          ./scripts/github-governance.ps1 -Apply -BranchProtectionOnly
          ./scripts/github-facade-assert.ps1 -BranchProtectionOnly

      - name: Apply all repository governance
        if: ${{ inputs.mode == 'apply-all' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_GOVERNANCE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw "REPO_GOVERNANCE_TOKEN repository secret is required for apply mode."
          }
          ./scripts/github-check-contexts.ps1 -RequireAvailable
          ./scripts/github-governance.ps1 -Apply
          ./scripts/github-facade-assert.ps1

      - name: Verify public facade
        if: ${{ inputs.mode == 'verify-only' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_GOVERNANCE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw "REPO_GOVERNANCE_TOKEN repository secret is required for verify mode."
          }
          ./scripts/github-check-contexts.ps1 -RequireAvailable
          ./scripts/github-facade-assert.ps1

      - name: Verify repository health
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_GOVERNANCE_TOKEN }}
        run: ./scripts/repository-health.ps1

      - name: Upload governance reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repository-governance-reports
          path: |
            reports/github-governance/
            reports/github-facade/
            reports/github-check-contexts/
            reports/repository-health/
          if-no-files-found: ignore
