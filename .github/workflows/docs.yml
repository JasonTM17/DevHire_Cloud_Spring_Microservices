name: Documentation

on:
  push:
    branches:
      - main
      - master
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Portfolio docs quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate portfolio documentation
        shell: pwsh
        run: ./scripts/docs-quality.ps1

      - name: Validate version consistency
        shell: pwsh
        run: ./scripts/version-consistency.ps1

      - name: Validate visual evidence quality
        shell: pwsh
        run: ./scripts/visual-evidence-audit.ps1
