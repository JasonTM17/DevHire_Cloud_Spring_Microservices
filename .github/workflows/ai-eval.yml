name: AI Assistant Evaluation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1"

permissions:
  contents: read

jobs:
  eval:
    name: Gateway AI eval smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Run AI eval through Gateway
        shell: pwsh
        run: ./scripts/ai-eval.ps1 -StartStack -Build -GatewayUrl http://localhost:18080

      - name: Upload AI eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-eval-summary
          path: reports/ai/eval-summary.json
          if-no-files-found: warn

      - name: Upload compose logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-ai-eval.log

      - name: Store compose logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-ai-eval-log
          path: compose-ai-eval.log
          if-no-files-found: ignore
