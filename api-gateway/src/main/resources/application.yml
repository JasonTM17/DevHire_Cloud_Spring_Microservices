server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

devhire:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-change-this-secret-with-at-least-32-characters}
  gateway:
    services:
      auth: ${AUTH_SERVICE_URL:http://localhost:8081}
      user: ${USER_SERVICE_URL:http://localhost:8082}
      company: ${COMPANY_SERVICE_URL:http://localhost:8083}
      job: ${JOB_SERVICE_URL:http://localhost:8084}
      application: ${APPLICATION_SERVICE_URL:http://localhost:8085}
      notification: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
      audit: ${AUDIT_SERVICE_URL:http://localhost:8087}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
    rate-limit:
      replenish-rate: ${GATEWAY_RATE_LIMIT_REPLENISH:20}
      burst-capacity: ${GATEWAY_RATE_LIMIT_BURST:40}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s,5s
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
