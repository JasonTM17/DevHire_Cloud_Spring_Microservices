title = "DevHire Cloud Gitleaks Configuration"

[allowlist]
description = "Allow documented local-only placeholders and deterministic demo credentials."
paths = [
  '''docs/PROGRESS\.md''',
  '''docs/api\.http''',
  '''README\.md''',
  '''docs/README_EN\.md''',
  '''docs/README_JA\.md''',
  '''\.env\.example''',
  '''\.env\.gmail\.example'''
]

regexes = [
  '''Admin@123456''',
  '''Employer@123456''',
  '''Candidate@123456''',
  '''replace-with-google-app-password''',
  '''your-google-app-password''',
  '''your-gmail-address@gmail\.com'''
]
