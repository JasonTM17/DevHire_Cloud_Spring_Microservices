apiVersion: v1
kind: Secret
metadata:
  name: devhire-secrets
  labels:
    app.kubernetes.io/name: devhire-cloud
    app.kubernetes.io/part-of: devhire-cloud
type: Opaque
stringData:
  JWT_SECRET: replace-with-a-strong-64-byte-production-secret
  AUTH_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_auth
  AUTH_DATABASE_USERNAME: devhire_auth
  AUTH_DATABASE_PASSWORD: replace-me
  USER_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_user
  USER_DATABASE_USERNAME: devhire_user
  USER_DATABASE_PASSWORD: replace-me
  COMPANY_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_company
  COMPANY_DATABASE_USERNAME: devhire_company
  COMPANY_DATABASE_PASSWORD: replace-me
  JOB_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_job
  JOB_DATABASE_USERNAME: devhire_job
  JOB_DATABASE_PASSWORD: replace-me
  APPLICATION_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_application
  APPLICATION_DATABASE_USERNAME: devhire_application
  APPLICATION_DATABASE_PASSWORD: replace-me
  NOTIFICATION_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_notification
  NOTIFICATION_DATABASE_USERNAME: devhire_notification
  NOTIFICATION_DATABASE_PASSWORD: replace-me
  AUDIT_DATABASE_URL: jdbc:postgresql://postgres.example.internal:5432/devhire_audit
  AUDIT_DATABASE_USERNAME: devhire_audit
  AUDIT_DATABASE_PASSWORD: replace-me
