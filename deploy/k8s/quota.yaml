apiVersion: v1
kind: ResourceQuota
metadata:
  name: devhire-compute-quota
  labels:
    app.kubernetes.io/name: devhire-cloud
    app.kubernetes.io/part-of: devhire-cloud
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 12Gi
    limits.cpu: "12"
    limits.memory: 24Gi
    pods: "40"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: devhire-container-limits
  labels:
    app.kubernetes.io/name: devhire-cloud
    app.kubernetes.io/part-of: devhire-cloud
spec:
  limits:
    - type: Container
      default:
        cpu: 750m
        memory: 768Mi
      defaultRequest:
        cpu: 100m
        memory: 384Mi
