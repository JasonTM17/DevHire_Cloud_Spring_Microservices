apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devhire-default-policy
  labels:
    app.kubernetes.io/name: devhire-cloud
    app.kubernetes.io/part-of: devhire-cloud
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: NotIn
        values:
          - assessment-runner-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3000
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devhire-assessment-runner-runtime
  labels:
    app.kubernetes.io/name: assessment-runner-service
    app.kubernetes.io/part-of: devhire-cloud
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: assessment-runner-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: application-service
      ports:
        - protocol: TCP
          port: 8089
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: devhire-platform
      ports:
        - protocol: TCP
          port: 2358
