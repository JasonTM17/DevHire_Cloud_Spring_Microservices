global:
  namespace: devhire
  imageRegistry: ghcr.io/jasontm17/devhire
  imageTag: latest
  imagePullPolicy: IfNotPresent
  publicDomain: devhire.invalid
  publicBaseUrl: https://devhire.invalid
  smtpFrom: no-reply@devhire.invalid
  smtpReplyTo: support@devhire.invalid
  env:
    SPRING_PROFILES_ACTIVE: prod
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"

secrets:
  createExample: false
  name: devhire-secrets

ingress:
  enabled: true
  className: nginx
  host: ""
  tls:
    enabled: true
    secretName: devhire-tls

pdb:
  enabled: true

networkPolicy:
  enabled: true

quota:
  enabled: true
