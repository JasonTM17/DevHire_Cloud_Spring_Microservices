global:
  replicas: 1
  imageRegistry: devhire
  imageTag: local
  imagePullPolicy: IfNotPresent
  env:
    SPRING_PROFILES_ACTIVE: local
    CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:13001
    DEVHIRE_NOTIFICATION_EMAIL_ENABLED: "false"
    DEVHIRE_NOTIFICATION_EMAIL_FROM: no-reply@devhire.local
    DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL: http://localhost:8080
    NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    DEVHIRE_SEARCH_OPENSEARCH_URL: http://opensearch:9200
    ANTHROPIC_MODEL: claude-haiku-4-5-20251001
    DEVHIRE_AI_DEMO_FALLBACK_ENABLED: "true"
    DEVHIRE_AI_PROVIDER_FAILURE_THRESHOLD: "3"
    DEVHIRE_AI_PROVIDER_CIRCUIT_OPEN_SECONDS: "60"
    DEVHIRE_RUNNER_MODE: deterministic
    JUDGE0_BASE_URL: ""
    JUDGE0_AUTH_TOKEN: ""
    DEVHIRE_RUNNER_CONNECT_TIMEOUT_MS: "2000"
    DEVHIRE_RUNNER_READ_TIMEOUT_MS: "10000"
    DEVHIRE_RUNNER_POLL_INTERVAL_MS: "250"
    DEVHIRE_RUNNER_POLL_MAX_ATTEMPTS: "20"

secrets:
  createExample: true
  stringData:
    JWT_SECRET: local-dev-only-change-me-change-me-change-me-change-me
    DEVHIRE_GATEWAY_INTERNAL_TOKEN: local-devhire-gateway-boundary-token
    POSTGRES_USER: devhire
    POSTGRES_PASSWORD: devhire_local_password
    SPRING_MAIL_USERNAME: ""
    SPRING_MAIL_PASSWORD: ""
    ANTHROPIC_API_KEY: ""

ingress:
  enabled: false
  tls:
    enabled: false

pdb:
  enabled: false

services:
  frontend:
    replicas: 1
    autoscaling:
      enabled: false
  api-gateway:
    replicas: 1
    autoscaling:
      enabled: false
  ai-service:
    replicas: 1
