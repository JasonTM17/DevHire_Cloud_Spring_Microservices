global:
  namespace: devhire-staging
  imageRegistry: ghcr.io/jasontm17/devhire
  imageTag: sha-REPLACE_WITH_GIT_SHA
  imagePullPolicy: Always
  publicDomain: staging.devhire.invalid
  publicBaseUrl: https://staging.devhire.invalid
  smtpFrom: no-reply@staging.devhire.invalid
  smtpReplyTo: support@devhire.invalid
  env:
    SPRING_PROFILES_ACTIVE: staging
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.25"

ingress:
  host: ""
  tls:
    enabled: true
    secretName: devhire-staging-tls

services:
  frontend:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  api-gateway:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
