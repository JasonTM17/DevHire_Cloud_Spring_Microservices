global:
  namespace: devhire-staging
  imageRegistry: ghcr.io/jasontm17/devhire
  imageTag: staging
  env:
    SPRING_PROFILES_ACTIVE: staging
    CORS_ALLOWED_ORIGINS: https://staging.devhire.example.com
    DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL: https://staging.devhire.example.com
    NEXT_PUBLIC_API_BASE_URL: https://staging.devhire.example.com
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.25"

ingress:
  host: staging.devhire.example.com
  tls:
    enabled: true
    secretName: devhire-staging-tls

services:
  frontend:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  api-gateway:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
