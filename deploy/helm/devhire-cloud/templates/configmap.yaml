apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devhire.configName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
{{ include "devhire.labels" . | nindent 4 }}
data:
{{- $env := deepCopy (default dict .Values.global.env) }}
{{- if not (hasKey $env "CORS_ALLOWED_ORIGINS") }}
{{- $_ := set $env "CORS_ALLOWED_ORIGINS" (include "devhire.publicBaseUrl" .) }}
{{- end }}
{{- if not (hasKey $env "DEVHIRE_NOTIFICATION_EMAIL_FROM") }}
{{- $_ := set $env "DEVHIRE_NOTIFICATION_EMAIL_FROM" (include "devhire.smtpFrom" .) }}
{{- end }}
{{- if not (hasKey $env "DEVHIRE_NOTIFICATION_EMAIL_REPLY_TO") }}
{{- $_ := set $env "DEVHIRE_NOTIFICATION_EMAIL_REPLY_TO" (include "devhire.smtpReplyTo" .) }}
{{- end }}
{{- if not (hasKey $env "DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL") }}
{{- $_ := set $env "DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL" (include "devhire.publicBaseUrl" .) }}
{{- end }}
{{- if not (hasKey $env "NEXT_PUBLIC_API_BASE_URL") }}
{{- $_ := set $env "NEXT_PUBLIC_API_BASE_URL" (include "devhire.publicBaseUrl" .) }}
{{- end }}
{{- range $key, $value := $env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
