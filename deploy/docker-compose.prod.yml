name: devhire-cloud-prod-sample

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: prod
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:?set SPRING_KAFKA_BOOTSTRAP_SERVERS}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-0.1}
  DEVHIRE_GATEWAY_INTERNAL_TOKEN: ${DEVHIRE_GATEWAY_INTERNAL_TOKEN:?set DEVHIRE_GATEWAY_INTERNAL_TOKEN}

services:
  frontend:
    image: ${REGISTRY:-ghcr.io/example}/devhire/frontend:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?set NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"

  api-gateway:
    image: ${REGISTRY:-ghcr.io/example}/devhire/api-gateway:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      COMPANY_SERVICE_URL: http://company-service:8083
      JOB_SERVICE_URL: http://job-service:8084
      APPLICATION_SERVICE_URL: http://application-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      AUDIT_SERVICE_URL: http://audit-service:8087
      AI_SERVICE_URL: http://ai-service:8088
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"

  auth-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/auth-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${AUTH_DATABASE_URL:?set AUTH_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DATABASE_USERNAME:?set AUTH_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DATABASE_PASSWORD:?set AUTH_DATABASE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}

  user-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/user-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${USER_DATABASE_URL:?set USER_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_DATABASE_USERNAME:?set USER_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${USER_DATABASE_PASSWORD:?set USER_DATABASE_PASSWORD}

  company-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/company-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${COMPANY_DATABASE_URL:?set COMPANY_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${COMPANY_DATABASE_USERNAME:?set COMPANY_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${COMPANY_DATABASE_PASSWORD:?set COMPANY_DATABASE_PASSWORD}

  job-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/job-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${JOB_DATABASE_URL:?set JOB_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${JOB_DATABASE_USERNAME:?set JOB_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${JOB_DATABASE_PASSWORD:?set JOB_DATABASE_PASSWORD}
      COMPANY_SERVICE_URL: http://company-service:8083
      DEVHIRE_SEARCH_PROVIDER: ${DEVHIRE_SEARCH_PROVIDER:-opensearch}
      DEVHIRE_SEARCH_OPENSEARCH_URL: ${DEVHIRE_SEARCH_OPENSEARCH_URL:?set DEVHIRE_SEARCH_OPENSEARCH_URL}
      DEVHIRE_SEARCH_OPENSEARCH_INDEX: ${DEVHIRE_SEARCH_OPENSEARCH_INDEX:-devhire_jobs}
      DEVHIRE_SEARCH_OPENSEARCH_AUTO_CREATE_INDEX: ${DEVHIRE_SEARCH_OPENSEARCH_AUTO_CREATE_INDEX:-false}
      DEVHIRE_SEARCH_OPENSEARCH_FALLBACK_TO_POSTGRES: ${DEVHIRE_SEARCH_OPENSEARCH_FALLBACK_TO_POSTGRES:-true}

  application-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/application-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${APPLICATION_DATABASE_URL:?set APPLICATION_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${APPLICATION_DATABASE_USERNAME:?set APPLICATION_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${APPLICATION_DATABASE_PASSWORD:?set APPLICATION_DATABASE_PASSWORD}
      JOB_SERVICE_URL: http://job-service:8084
      ASSESSMENT_RUNNER_SERVICE_URL: http://assessment-runner-service:8089

  notification-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/notification-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${NOTIFICATION_DATABASE_URL:?set NOTIFICATION_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${NOTIFICATION_DATABASE_USERNAME:?set NOTIFICATION_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_DATABASE_PASSWORD:?set NOTIFICATION_DATABASE_PASSWORD}
      USER_SERVICE_URL: http://user-service:8082
      DEVHIRE_NOTIFICATION_EMAIL_ENABLED: ${DEVHIRE_NOTIFICATION_EMAIL_ENABLED:-true}
      DEVHIRE_NOTIFICATION_EMAIL_FROM: ${DEVHIRE_NOTIFICATION_EMAIL_FROM:?set DEVHIRE_NOTIFICATION_EMAIL_FROM}
      DEVHIRE_NOTIFICATION_EMAIL_REPLY_TO: ${DEVHIRE_NOTIFICATION_EMAIL_REPLY_TO:-}
      DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL: ${DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL:?set DEVHIRE_NOTIFICATION_EMAIL_DASHBOARD_BASE_URL}
      DEVHIRE_NOTIFICATION_EMAIL_BATCH_SIZE: ${DEVHIRE_NOTIFICATION_EMAIL_BATCH_SIZE:-25}
      DEVHIRE_NOTIFICATION_EMAIL_MAX_ATTEMPTS: ${DEVHIRE_NOTIFICATION_EMAIL_MAX_ATTEMPTS:-5}
      DEVHIRE_NOTIFICATION_EMAIL_RETRY_INITIAL_DELAY_SECONDS: ${DEVHIRE_NOTIFICATION_EMAIL_RETRY_INITIAL_DELAY_SECONDS:-30}
      DEVHIRE_NOTIFICATION_EMAIL_RETRY_MAX_DELAY_SECONDS: ${DEVHIRE_NOTIFICATION_EMAIL_RETRY_MAX_DELAY_SECONDS:-900}
      DEVHIRE_NOTIFICATION_EMAIL_RATE_LIMIT_PER_MINUTE: ${DEVHIRE_NOTIFICATION_EMAIL_RATE_LIMIT_PER_MINUTE:-60}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:?set SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:?set SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:?set SPRING_MAIL_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SMTP_STARTTLS_REQUIRED: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      SPRING_MAIL_SMTP_SSL_TRUST: ${SPRING_MAIL_SMTP_SSL_TRUST:-smtp.gmail.com}
      SPRING_MAIL_SMTP_CONNECTION_TIMEOUT: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      SPRING_MAIL_SMTP_TIMEOUT: ${SPRING_MAIL_SMTP_TIMEOUT:-5000}
      SPRING_MAIL_SMTP_WRITE_TIMEOUT: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:-5000}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED:-true}

  audit-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/audit-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${AUDIT_DATABASE_URL:?set AUDIT_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${AUDIT_DATABASE_USERNAME:?set AUDIT_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUDIT_DATABASE_PASSWORD:?set AUDIT_DATABASE_PASSWORD}

  ai-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/ai-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: ${AI_DATABASE_URL:?set AI_DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${AI_DATABASE_USERNAME:?set AI_DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AI_DATABASE_PASSWORD:?set AI_DATABASE_PASSWORD}
      JOB_SERVICE_URL: http://job-service:8084
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-900}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      DEVHIRE_AI_DEMO_FALLBACK_ENABLED: ${DEVHIRE_AI_DEMO_FALLBACK_ENABLED:-true}
      DEVHIRE_AI_PROVIDER_FAILURE_THRESHOLD: ${DEVHIRE_AI_PROVIDER_FAILURE_THRESHOLD:-3}
      DEVHIRE_AI_PROVIDER_CIRCUIT_OPEN_SECONDS: ${DEVHIRE_AI_PROVIDER_CIRCUIT_OPEN_SECONDS:-120}

  assessment-runner-service:
    image: ${REGISTRY:-ghcr.io/example}/devhire/assessment-runner-service:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *common-env
      DEVHIRE_GATEWAY_INTERNAL_TOKEN: ${DEVHIRE_GATEWAY_INTERNAL_TOKEN:?set DEVHIRE_GATEWAY_INTERNAL_TOKEN}
      DEVHIRE_RUNNER_MODE: ${DEVHIRE_RUNNER_MODE:-judge0}
      JUDGE0_BASE_URL: ${JUDGE0_BASE_URL:?set JUDGE0_BASE_URL}
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-}
      DEVHIRE_RUNNER_NETWORK_DISABLED: "true"
      DEVHIRE_RUNNER_DEFAULT_TIME_LIMIT_MS: ${DEVHIRE_RUNNER_DEFAULT_TIME_LIMIT_MS:-2000}
      DEVHIRE_RUNNER_DEFAULT_MEMORY_KB: ${DEVHIRE_RUNNER_DEFAULT_MEMORY_KB:-131072}
      DEVHIRE_RUNNER_MAX_OUTPUT_BYTES: ${DEVHIRE_RUNNER_MAX_OUTPUT_BYTES:-12000}
      DEVHIRE_RUNNER_CONNECT_TIMEOUT_MS: ${DEVHIRE_RUNNER_CONNECT_TIMEOUT_MS:-2000}
      DEVHIRE_RUNNER_READ_TIMEOUT_MS: ${DEVHIRE_RUNNER_READ_TIMEOUT_MS:-10000}
      DEVHIRE_RUNNER_POLL_INTERVAL_MS: ${DEVHIRE_RUNNER_POLL_INTERVAL_MS:-250}
      DEVHIRE_RUNNER_POLL_MAX_ATTEMPTS: ${DEVHIRE_RUNNER_POLL_MAX_ATTEMPTS:-20}
      DEVHIRE_RUNNER_VERSION: devhire-runtime-v0.7
    expose:
      - "8089"
