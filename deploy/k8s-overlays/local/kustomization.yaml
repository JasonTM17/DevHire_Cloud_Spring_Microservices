apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: devhire-local
resources:
  - ../../k8s
patches:
  - target:
      kind: Namespace
      name: devhire
    patch: |-
      - op: replace
        path: /metadata/name
        value: devhire-local
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
  - target:
      kind: Ingress
      name: devhire-api
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: devhire.local
  - target:
      kind: ConfigMap
      name: devhire-config
    patch: |-
      - op: replace
        path: /data/DEVHIRE_RUNNER_MODE
        value: deterministic
      - op: replace
        path: /data/JUDGE0_BASE_URL
        value: ""
