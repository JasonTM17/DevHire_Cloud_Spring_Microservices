apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: devhire
resources:
  - ../../k8s
patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: job-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: application-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Ingress
      name: devhire-api
    patch: |-
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - devhire.example.com
            secretName: devhire-api-tls
